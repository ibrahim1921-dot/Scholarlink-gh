# ── DataSource — H2 in-memory ──────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ── Active profile ─────────────────────────────────────────────────────────────

# ── JWT configuration (test-only secret — 64-char hex) ─────────────────────────
jwt.secret=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
jwt.access-token-expiry-ms=1800000
jwt.refresh-token-expiry-ms=604800000

# ── Security ───────────────────────────────────────────────────────────────────
security.allowed-origins=http://localhost:3000
security.inactivity-timeout-minutes=30

# ── Auth policy ────────────────────────────────────────────────────────────────
auth.max-failed-attempts=5
auth.lockout-minutes=15
auth.reset-token-expiry-minutes=15

# ── OTP ────────────────────────────────────────────────────────────────────────
otp.expiry-minutes=10
otp.email-subject=ScholarLink GH Verification Code

# ── Mail — disable actual sending in tests ─────────────────────────────────────
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# ── Document upload ────────────────────────────────────────────────────────────
document.max-file-size-mb=10
document.disclaimer-validity-days=90
document.upload.directory=test-uploads

# ── Firebase — disabled (no service account key path) ──────────────────────────
firebase.service-account-key-path=
firebase.project-id=

# ── Admin bootstrap — disabled in tests ────────────────────────────────────────
admin.bootstrap.email=
admin.bootstrap.password=

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=0
